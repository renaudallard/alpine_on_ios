name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build emulator
        run: make -C emu

      - name: Run tests
        run: make -C emu test

  build-ios:
    name: Build iOS
    runs-on: macos-14
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Download rootfs
        run: ./rootfs/download_rootfs.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild build \
            -project AlpineOnIOS.xcodeproj \
            -scheme AlpineOnIOS \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Package IPA
        run: |
          BUILD_DIR=$(xcodebuild -project AlpineOnIOS.xcodeproj \
            -scheme AlpineOnIOS \
            -sdk iphoneos \
            -configuration Release \
            -showBuildSettings CODE_SIGNING_ALLOWED=NO \
            | grep -m1 'BUILT_PRODUCTS_DIR' | awk '{print $3}')
          mkdir -p Payload
          cp -r "$BUILD_DIR/AlpineOnIOS.app" Payload/
          zip -r AlpineOnIOS.ipa Payload/
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v5
        with:
          name: AlpineOnIOS-ci
          path: AlpineOnIOS.ipa
