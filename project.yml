name: AlpineOnIOS
options:
  bundleIdPrefix: com.alpineonios
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    HEADER_SEARCH_PATHS: $(SRCROOT)/emu/include
    SWIFT_OBJC_BRIDGING_HEADER: $(SRCROOT)/AlpineOnIOS/Bridge/AlpineOnIOS-Bridging-Header.h

targets:
  AlpineOnIOS:
    type: application
    platform: iOS
    sources:
      - path: AlpineOnIOS
        excludes:
          - "**/*.plist"
      - path: emu/src
        compilerFlags: ["-std=c11", "-Wall", "-Wextra"]
        type: sources
        excludes:
          - "**/*.S"
      - path: emu/src/jit_entry.S
        type: sources
      - path: emu/include
        type: headers
        headerVisibility: project
    info:
      path: AlpineOnIOS/App/Info.plist
    entitlements:
      path: AlpineOnIOS.entitlements
    dependencies:
      - sdk: Metal.framework
      - sdk: MetalKit.framework
    postBuildScripts:
      - script: |
          # Copy Alpine rootfs into the app bundle and convert absolute
          # symlinks to relative ones. iOS breaks absolute symlinks
          # (like /bin/sh -> /bin/busybox) during IPA installation
          # because the targets don't exist on the host filesystem.
          ROOTFS="${SRCROOT}/rootfs/alpine"
          DEST="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/alpine"
          if [ -d "$ROOTFS" ]; then
            echo "Copying rootfs to app bundle..."
            rm -rf "$DEST"
            cp -a "$ROOTFS" "$DEST"

            echo "Converting absolute symlinks to relative..."
            find "$DEST" -type l | while read -r link; do
              target=$(readlink "$link")
              if [ "${target#/}" != "$target" ]; then
                # Absolute symlink: convert to relative
                link_dir=$(dirname "$link")
                # Compute relative path from link location to rootfs + target
                abs_target="${DEST}${target}"
                rel_target=$(python3 -c "import os.path; print(os.path.relpath('$abs_target', '$link_dir'))")
                rm "$link"
                ln -s "$rel_target" "$link"
              fi
            done

            echo "Rootfs copied: $(du -sh "$DEST" | cut -f1)"
            echo "Symlinks converted: $(find "$DEST" -type l | wc -l) remaining"
          else
            echo "warning: rootfs not found at $ROOTFS"
          fi
        name: Copy Alpine rootfs
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alpineonios.app
        MARKETING_VERSION: "0.5.5"
        CURRENT_PROJECT_VERSION: 18
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_ALLOWED: "NO"
        INFOPLIST_KEY_CFBundleDisplayName: "Alpine Terminal"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        ENABLE_HARDENED_RUNTIME: "NO"
        GCC_PREPROCESSOR_DEFINITIONS:
          - "$(inherited)"
          - "_GNU_SOURCE=1"
