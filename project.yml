name: AlpineOnIOS
options:
  bundleIdPrefix: com.alpineonios
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    HEADER_SEARCH_PATHS: $(SRCROOT)/emu/include
    SWIFT_OBJC_BRIDGING_HEADER: $(SRCROOT)/AlpineOnIOS/Bridge/AlpineOnIOS-Bridging-Header.h

targets:
  AlpineOnIOS:
    type: application
    platform: iOS
    sources:
      - path: AlpineOnIOS
        excludes:
          - "**/*.plist"
      - path: emu/src
        compilerFlags: ["-std=c11", "-Wall", "-Wextra"]
        type: sources
        excludes:
          - "**/*.S"
      - path: emu/src/jit_entry.S
        type: sources
      - path: emu/include
        type: headers
        headerVisibility: project
    info:
      path: AlpineOnIOS/App/Info.plist
    entitlements:
      path: AlpineOnIOS.entitlements
    dependencies:
      - sdk: Metal.framework
      - sdk: MetalKit.framework
    postBuildScripts:
      - script: |
          # Copy Alpine rootfs into the app bundle, stripping symlinks.
          # iOS breaks symlinks during IPA installation. Busybox applet
          # links are created at first launch via "busybox --install".
          ROOTFS="${SRCROOT}/rootfs/alpine"
          DEST="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/alpine"
          if [ -d "$ROOTFS" ]; then
            echo "Copying rootfs (no symlinks)..."
            rm -rf "$DEST"
            rsync -a --no-links "$ROOTFS/" "$DEST/"
            echo "Rootfs: $(du -sh "$DEST" | cut -f1), symlinks: $(find "$DEST" -type l | wc -l)"
          else
            echo "warning: rootfs not found at $ROOTFS"
          fi
        name: Copy Alpine rootfs
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alpineonios.app
        MARKETING_VERSION: "0.6.5"
        CURRENT_PROJECT_VERSION: 29
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_ALLOWED: "NO"
        INFOPLIST_KEY_CFBundleDisplayName: "Alpine Terminal"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        ENABLE_HARDENED_RUNTIME: "NO"
        GCC_PREPROCESSOR_DEFINITIONS:
          - "$(inherited)"
          - "_GNU_SOURCE=1"
