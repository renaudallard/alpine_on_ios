name: AlpineOnIOS
options:
  bundleIdPrefix: com.alpineonios
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    HEADER_SEARCH_PATHS: $(SRCROOT)/emu/include
    SWIFT_OBJC_BRIDGING_HEADER: $(SRCROOT)/AlpineOnIOS/Bridge/AlpineOnIOS-Bridging-Header.h

targets:
  AlpineOnIOS:
    type: application
    platform: iOS
    sources:
      - path: AlpineOnIOS
        excludes:
          - "**/*.plist"
      - path: emu/src
        compilerFlags: ["-std=c11", "-Wall", "-Wextra"]
        type: sources
        excludes:
          - "**/*.S"
      - path: emu/src/jit_entry.S
        type: sources
      - path: emu/include
        type: headers
        headerVisibility: project
    info:
      path: AlpineOnIOS/App/Info.plist
    entitlements:
      path: AlpineOnIOS.entitlements
    dependencies:
      - sdk: Metal.framework
      - sdk: MetalKit.framework
    postBuildScripts:
      - script: |
          # Copy Alpine rootfs into the app bundle and replace all
          # symlinks with actual file copies. iOS/AltStore may not
          # preserve symlinks during IPA installation, causing
          # broken (empty) files.
          ROOTFS="${SRCROOT}/rootfs/alpine"
          DEST="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/alpine"
          if [ -d "$ROOTFS" ]; then
            echo "Copying rootfs to app bundle..."
            rm -rf "$DEST"
            cp -a "$ROOTFS" "$DEST"

            echo "Replacing symlinks with file copies..."
            find "$DEST" -type l | while read -r link; do
              target=$(readlink "$link")
              # Resolve the target relative to the rootfs
              if [ "${target#/}" != "$target" ]; then
                # Absolute target: resolve within rootfs
                real_target="${DEST}${target}"
              else
                # Relative target: resolve from symlink directory
                real_target="$(dirname "$link")/${target}"
              fi
              if [ -f "$real_target" ]; then
                rm "$link"
                cp "$real_target" "$link"
              elif [ -d "$real_target" ]; then
                rm "$link"
                cp -a "$real_target" "$link"
              else
                echo "warning: broken symlink $link -> $target"
                rm "$link"
              fi
            done

            echo "Rootfs copied: $(du -sh "$DEST" | cut -f1)"
            echo "Remaining symlinks: $(find "$DEST" -type l | wc -l)"
          else
            echo "warning: rootfs not found at $ROOTFS"
          fi
        name: Copy Alpine rootfs
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alpineonios.app
        MARKETING_VERSION: "0.5.6"
        CURRENT_PROJECT_VERSION: 19
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_ALLOWED: "NO"
        INFOPLIST_KEY_CFBundleDisplayName: "Alpine Terminal"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        ENABLE_HARDENED_RUNTIME: "NO"
        GCC_PREPROCESSOR_DEFINITIONS:
          - "$(inherited)"
          - "_GNU_SOURCE=1"
